<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Araç Katım</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      background: #0d0d1a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      height: 100svh;
      overflow: hidden;
      user-select: none;
      touch-action: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ---------- üst başlık ---------- */
    #header {
      position: absolute;
      top: 32px;
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    }

    /* ---------- kart ---------- */
    #card-wrap {
      position: relative;
      width: min(320px, 88vw);
      height: min(420px, 72vw + 180px);
    }

    #card {
      width: 100%;
      height: 100%;
      border-radius: 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: grab;
      will-change: transform;
      box-shadow: 0 40px 100px rgba(0,0,0,0.6);
      position: relative;
      overflow: hidden;
      /* renk JS tarafından set edilir */
    }

    #card:active { cursor: grabbing; }

    /* Kart üzerindeki ışık efekti */
    #card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 36px;
      background: radial-gradient(ellipse at 30% 20%, rgba(255,255,255,0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    /* sürükleme renk overlay */
    #drag-glow {
      position: absolute;
      inset: 0;
      border-radius: 36px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.1s;
    }

    #car-icon { font-size: 52px; margin-bottom: 12px; }

    #floor-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      opacity: 0.55;
      margin-bottom: 4px;
    }

    #floor-number {
      font-size: clamp(96px, 28vw, 130px);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -6px;
    }

    #floor-tag {
      margin-top: 14px;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: 1px;
      padding: 6px 20px;
      border-radius: 100px;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(4px);
    }

    /* ---------- yön ipuçları ---------- */
    .hint {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      color: rgba(255,255,255,0.25);
      font-size: 12px;
      letter-spacing: 1px;
      transition: opacity 0.3s;
    }
    #hint-left  { left: -52px; }
    #hint-right { right: -52px; }

    .hint-arrow {
      font-size: 26px;
      line-height: 1;
      animation: breathe 2.4s ease-in-out infinite;
    }
    #hint-right .hint-arrow { animation-delay: 1.2s; }

    @keyframes breathe {
      0%,100% { opacity: 0.2; transform: scale(0.9); }
      50%      { opacity: 0.6; transform: scale(1.05); }
    }

    /* ---------- alt bilgi ---------- */
    #bottom {
      position: absolute;
      bottom: 40px;
      text-align: center;
    }

    #saved-label {
      font-size: 13px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.5px;
    }

    #saved-value {
      font-size: 18px;
      font-weight: 700;
      margin-top: 4px;
    }

    /* ---------- kaydet butonu ---------- */
    #save-btn {
      position: absolute;
      bottom: 110px;
      background: rgba(255,255,255,0.1);
      border: 1.5px solid rgba(255,255,255,0.15);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1px;
      padding: 10px 28px;
      border-radius: 100px;
      cursor: pointer;
      backdrop-filter: blur(6px);
      transition: background 0.2s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    #save-btn:active { background: rgba(255,255,255,0.2); transform: scale(0.96); }

    /* "Kaydedildi!" flash */
    #flash {
      position: absolute;
      bottom: 114px;
      font-size: 14px;
      font-weight: 700;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
  </style>
</head>
<body>

  <div id="header">Araç Katım</div>

  <div id="card-wrap">
    <!-- yön ipuçları -->
    <div class="hint" id="hint-left">
      <div class="hint-arrow">‹</div>
      <div>−1</div>
    </div>
    <div class="hint" id="hint-right">
      <div class="hint-arrow">›</div>
      <div>+1</div>
    </div>

    <!-- ana kart -->
    <div id="card">
      <div id="drag-glow"></div>
      <div id="car-icon">🚗</div>
      <div id="floor-label">Araç Katım</div>
      <div id="floor-number">0</div>
      <div id="floor-tag">Zemin Kat</div>
    </div>
  </div>

  <!-- kaydet butonu -->
  <button id="save-btn">📍 Bu Katı Kaydet</button>
  <div id="flash">✓ Kaydedildi!</div>

  <!-- kayıtlı bilgi -->
  <div id="bottom">
    <div id="saved-label">Son kaydedilen kat</div>
    <div id="saved-value" style="color:rgba(255,255,255,0.35)">—</div>
  </div>

<script>
  // ── Renk teması ──────────────────────────────────────────────────
  function theme(floor) {
    if (floor === 0) return {
      num:  '#4ade80',
      tag:  'Zemin Kat',
      bg:   'linear-gradient(145deg,#14291e,#1a3528)',
      glow: 'rgba(74,222,128,0.25)'
    };
    if (floor < 0) return {
      num:  '#60a5fa',
      tag:  `B${Math.abs(floor)}`,
      bg:   'linear-gradient(145deg,#0e1830,#132040)',
      glow: 'rgba(96,165,250,0.25)'
    };
    return {
      num:  '#fb923c',
      tag:  `${floor}. Kat`,
      bg:   'linear-gradient(145deg,#261508,#301c10)',
      glow: 'rgba(251,146,60,0.25)'
    };
  }

  // ── DOM ──────────────────────────────────────────────────────────
  const card        = document.getElementById('card');
  const dragGlow    = document.getElementById('drag-glow');
  const numEl       = document.getElementById('floor-number');
  const tagEl       = document.getElementById('floor-tag');
  const savedVal    = document.getElementById('saved-value');
  const saveBtn     = document.getElementById('save-btn');
  const flashEl     = document.getElementById('flash');

  // ── Durum ────────────────────────────────────────────────────────
  let current = parseInt(localStorage.getItem('currentFloor') || '0');
  let saved   = localStorage.getItem('savedFloor');

  // ── Görünüm güncelle ─────────────────────────────────────────────
  function render(floor, animate) {
    const t = theme(floor);
    numEl.textContent = floor;
    numEl.style.color = t.num;
    tagEl.textContent = t.tag;
    if (animate) {
      card.style.transition = 'background 0.5s ease';
    } else {
      card.style.transition = 'none';
    }
    card.style.background = t.bg;

    if (saved !== null) {
      const s = parseInt(saved);
      const st = theme(s);
      savedVal.textContent = `${s}  •  ${st.tag}`;
      savedVal.style.color = st.num;
    } else {
      savedVal.textContent = '—';
      savedVal.style.color = 'rgba(255,255,255,0.35)';
    }
  }

  // ── Kart animasyonu ──────────────────────────────────────────────
  function springSnap() {
    card.style.transition = 'transform 0.55s cubic-bezier(0.34,1.56,0.64,1)';
    card.style.transform  = 'translateX(0) rotate(0deg)';
    dragGlow.style.opacity = '0';
    setTimeout(() => { card.style.transition = ''; }, 550);
  }

  function bounceBack() {
    card.style.transition = 'transform 0.45s cubic-bezier(0.34,1.56,0.64,1)';
    card.style.transform  = 'translateX(0) rotate(0deg)';
    dragGlow.style.opacity = '0';
    setTimeout(() => { card.style.transition = ''; }, 450);
  }

  function changeFloor(delta) {
    current += delta;
    localStorage.setItem('currentFloor', current);
    springSnap();
    setTimeout(() => render(current, true), 80);
  }

  // ── Kaydedildi flash ─────────────────────────────────────────────
  function showFlash(color) {
    flashEl.style.color   = color;
    flashEl.style.opacity = '1';
    saveBtn.style.opacity = '0';
    setTimeout(() => {
      flashEl.style.opacity = '0';
      saveBtn.style.opacity = '1';
    }, 1200);
  }

  saveBtn.addEventListener('click', () => {
    saved = current;
    localStorage.setItem('savedFloor', saved);
    render(current, false);
    showFlash(theme(current).num);
  });

  // ── Dokunma / Fare sürükleme ─────────────────────────────────────
  let startX = 0, dx = 0, vx = 0, prevX = 0, prevT = 0, dragging = false;
  const THRESHOLD  = 55;  // minimum sürükleme mesafesi (px)
  const VEL_THRESH = 0.35; // hız eşiği (px/ms)
  const DAMPING    = 0.42; // ağırlık direnci (1 = serbest)

  function onStart(clientX) {
    startX = clientX; dx = 0; vx = 0;
    prevX  = clientX; prevT = Date.now();
    dragging = true;
    card.style.transition = '';
  }

  function onMove(clientX) {
    if (!dragging) return;
    const now = Date.now();
    dx  = clientX - startX;
    vx  = (clientX - prevX) / Math.max(now - prevT, 1);
    prevX = clientX; prevT = now;

    const translated = dx * DAMPING;
    const rot = (dx / window.innerWidth) * 10;
    card.style.transform = `translateX(${translated}px) rotate(${rot}deg)`;

    // renk glow
    const t = theme(current);
    if (Math.abs(dx) > 15) {
      dragGlow.style.background = dx > 0
        ? `linear-gradient(to right, transparent, ${t.glow})`
        : `linear-gradient(to left,  transparent, ${t.glow})`;
      dragGlow.style.opacity = String(Math.min(Math.abs(dx) / 120, 1));
    } else {
      dragGlow.style.opacity = '0';
    }
  }

  function onEnd() {
    if (!dragging) return;
    dragging = false;
    if      (dx >  THRESHOLD || vx >  VEL_THRESH) changeFloor(+1);
    else if (dx < -THRESHOLD || vx < -VEL_THRESH) changeFloor(-1);
    else bounceBack();
    dx = 0;
  }

  // Touch
  card.addEventListener('touchstart', e => { if (e.touches.length === 1) onStart(e.touches[0].clientX); }, {passive:true});
  card.addEventListener('touchmove',  e => onMove(e.touches[0].clientX), {passive:true});
  card.addEventListener('touchend',   onEnd);
  card.addEventListener('touchcancel',onEnd);

  // Mouse (masaüstü test)
  card.addEventListener('mousedown', e => { onStart(e.clientX); e.preventDefault(); });
  document.addEventListener('mousemove', e => { if (dragging) onMove(e.clientX); });
  document.addEventListener('mouseup',   onEnd);

  // ── İlk yükleme ──────────────────────────────────────────────────
  render(current, false);
</script>
</body>
</html>
