<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Araç Katım</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      background: #0d0d1a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      height: 100svh;
      overflow: hidden;
      user-select: none;
      display: flex;
      flex-direction: column;
    }

    .page {
      display: none;
      position: relative;
      flex: 1;
      overflow: hidden;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .page.active { display: flex; }

    /* ── Tab Bar ── */
    #tab-bar {
      height: 60px;
      flex-shrink: 0;
      display: flex;
      background: rgba(10,10,20,0.97);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      border: none;
      background: none;
      color: rgba(255,255,255,0.3);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: color 0.2s;
    }
    .tab.active { color: #fff; }
    .tab-icon { font-size: 20px; line-height: 1; }

    /* ══════════════════════════════════════════ */
    /*  KAT PAGE                                 */
    /* ══════════════════════════════════════════ */
    #kat-page { touch-action: none; }

    #header {
      position: absolute;
      top: 28px;
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    }

    #card-wrap {
      position: relative;
      width: min(300px, 84vw);
      height: min(390px, 66vw + 170px);
    }

    #card {
      width: 100%; height: 100%;
      border-radius: 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: grab;
      will-change: transform;
      box-shadow: 0 40px 100px rgba(0,0,0,0.6);
      position: relative;
      overflow: hidden;
      touch-action: none;
    }
    #card:active { cursor: grabbing; }
    #card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 36px;
      background: radial-gradient(ellipse at 30% 20%, rgba(255,255,255,0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    #drag-glow {
      position: absolute; inset: 0;
      border-radius: 36px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.1s;
    }

    #car-icon { font-size: 52px; margin-bottom: 12px; }

    #floor-label {
      font-size: 12px; font-weight: 700;
      letter-spacing: 4px; text-transform: uppercase;
      opacity: 0.55; margin-bottom: 4px;
    }

    #floor-number {
      font-size: clamp(96px, 28vw, 130px);
      font-weight: 900; line-height: 1; letter-spacing: -6px;
    }

    #floor-tag {
      margin-top: 14px; font-size: 17px; font-weight: 600;
      letter-spacing: 1px; padding: 6px 20px;
      border-radius: 100px;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(4px);
    }

    .hint {
      position: absolute; top: 50%; transform: translateY(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      color: rgba(255,255,255,0.25); font-size: 12px; letter-spacing: 1px;
    }
    #hint-left  { left: -50px; }
    #hint-right { right: -50px; }
    .hint-arrow {
      font-size: 26px; line-height: 1;
      animation: breathe 2.4s ease-in-out infinite;
    }
    #hint-right .hint-arrow { animation-delay: 1.2s; }
    @keyframes breathe {
      0%,100% { opacity: 0.2; transform: scale(0.9); }
      50%      { opacity: 0.6; transform: scale(1.05); }
    }

    #save-btn {
      position: absolute; bottom: 100px;
      background: rgba(255,255,255,0.1);
      border: 1.5px solid rgba(255,255,255,0.15);
      color: #fff; font-size: 14px; font-weight: 600;
      letter-spacing: 1px; padding: 10px 28px;
      border-radius: 100px; cursor: pointer;
      backdrop-filter: blur(6px);
      transition: background 0.2s, transform 0.1s;
    }
    #save-btn:active { background: rgba(255,255,255,0.2); transform: scale(0.96); }

    #flash {
      position: absolute; bottom: 104px;
      font-size: 14px; font-weight: 700;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }

    #bottom {
      position: absolute; bottom: 36px; text-align: center;
    }
    #saved-label { font-size: 13px; color: rgba(255,255,255,0.3); letter-spacing: 0.5px; }
    #saved-value { font-size: 18px; font-weight: 700; margin-top: 4px; }

    /* ══════════════════════════════════════════ */
    /*  AVM PAGE                                 */
    /* ══════════════════════════════════════════ */
    #avm-page { gap: 20px; padding: 16px 16px 8px; }

    #avm-title {
      font-size: 13px; font-weight: 700;
      letter-spacing: 4px; text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    }

    #avm-saved-card {
      width: min(300px, 84vw);
      background: linear-gradient(145deg, #180e2e, #201540);
      border-radius: 20px; padding: 16px 24px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    #avm-saved-text {
      font-size: 10px; font-weight: 700;
      letter-spacing: 3px; text-transform: uppercase;
      color: rgba(255,255,255,0.3); margin-bottom: 6px;
    }
    #avm-saved-value { font-size: 30px; font-weight: 900; letter-spacing: 4px; }

    #pickers-wrap {
      display: flex; gap: 0;
      width: min(300px, 84vw);
      position: relative;
      background: rgba(255,255,255,0.04);
      border-radius: 20px; overflow: hidden;
    }

    #sel-band {
      position: absolute; left: 0; right: 0;
      top: 50%; transform: translateY(-50%);
      height: 52px;
      background: rgba(167,139,250,0.1);
      border-top: 1px solid rgba(167,139,250,0.25);
      border-bottom: 1px solid rgba(167,139,250,0.25);
      pointer-events: none; z-index: 1;
    }

    .picker-col { flex: 1; display: flex; flex-direction: column; align-items: center; }

    .picker-label {
      font-size: 10px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      color: rgba(255,255,255,0.3); padding: 10px 0 4px;
    }

    .picker {
      width: 100%; height: 156px;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      touch-action: pan-y;
    }
    .picker::-webkit-scrollbar { display: none; }

    .picker-item {
      height: 52px;
      display: flex; align-items: center; justify-content: center;
      scroll-snap-align: center;
      font-weight: 800;
      transition: color 0.12s, font-size 0.12s;
    }

    #avm-save-btn {
      background: rgba(167,139,250,0.12);
      border: 1.5px solid rgba(167,139,250,0.3);
      color: #a78bfa; font-size: 14px; font-weight: 700;
      letter-spacing: 1px; padding: 12px 32px;
      border-radius: 100px; cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    #avm-save-btn:active { background: rgba(167,139,250,0.25); transform: scale(0.96); }

    #avm-flash {
      font-size: 14px; font-weight: 700;
      color: #a78bfa; opacity: 0;
      transition: opacity 0.3s; min-height: 16px;
    }

    /* ══════════════════════════════════════════ */
    /*  SÜRE PAGE                                */
    /* ══════════════════════════════════════════ */
    #sure-page {
      gap: 14px;
      padding: 16px 16px 12px;
      overflow-y: auto;
      touch-action: pan-y;
      justify-content: flex-start;
      padding-top: 24px;
    }

    #sure-title {
      font-size: 13px; font-weight: 700;
      letter-spacing: 4px; text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      flex-shrink: 0;
    }

    /* Timer card */
    #timer-card {
      width: min(300px, 84vw);
      background: linear-gradient(145deg, #0e1a30, #121f3a);
      border-radius: 24px;
      padding: 24px 20px 20px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      flex-shrink: 0;
    }

    #timer-icon { font-size: 28px; margin-bottom: 6px; }

    #timer-display {
      font-size: clamp(44px, 12vw, 58px);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -2px;
      transition: color 0.8s ease;
    }

    #timer-sub {
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      margin-top: 8px;
      letter-spacing: 0.3px;
    }

    /* Alarm section */
    #alarm-section {
      width: min(300px, 84vw);
      flex-shrink: 0;
    }

    .section-label {
      font-size: 10px; font-weight: 700;
      letter-spacing: 3px; text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      margin-bottom: 10px;
    }

    #alarm-buttons {
      display: flex; gap: 7px; flex-wrap: wrap;
    }

    .alarm-btn {
      flex: 1; min-width: 46px;
      padding: 9px 4px;
      border: 1.5px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.5);
      font-size: 12px; font-weight: 700;
      border-radius: 12px; cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .alarm-btn.active {
      border-color: #fbbf24;
      background: rgba(251,191,36,0.15);
      color: #fbbf24;
    }
    .alarm-btn:active { transform: scale(0.95); }

    #alarm-info {
      margin-top: 8px;
      font-size: 12px;
      color: #fbbf24;
      min-height: 16px;
      letter-spacing: 0.3px;
    }

    /* Note section */
    #note-section {
      width: min(300px, 84vw);
      flex-shrink: 0;
    }

    #note-input {
      width: 100%; height: 80px;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      color: #fff; font-size: 14px;
      font-family: inherit;
      padding: 12px 14px;
      resize: none; outline: none;
      touch-action: auto;
      user-select: text;
      -webkit-user-select: text;
    }
    #note-input::placeholder { color: rgba(255,255,255,0.2); }
    #note-input:focus { border-color: rgba(255,255,255,0.22); }

    #note-save-btn {
      margin-top: 8px; width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.6);
      font-size: 13px; font-weight: 600;
      padding: 10px; border-radius: 12px;
      cursor: pointer; font-family: inherit;
      transition: all 0.2s;
    }
    #note-save-btn:active { background: rgba(255,255,255,0.12); }

    #note-flash {
      font-size: 12px; color: #4ade80;
      opacity: 0; transition: opacity 0.3s;
      text-align: center; min-height: 16px; margin-top: 4px;
    }

    /* Reset button */
    #reset-btn {
      width: min(300px, 84vw);
      background: rgba(248,113,113,0.08);
      border: 1.5px solid rgba(248,113,113,0.2);
      color: #f87171;
      font-size: 13px; font-weight: 700;
      padding: 12px; border-radius: 100px;
      cursor: pointer; font-family: inherit;
      transition: all 0.25s;
      flex-shrink: 0;
      margin-bottom: 4px;
    }
    #reset-btn:active { background: rgba(248,113,113,0.18); }
    #reset-btn.confirm {
      border-color: #f87171;
      background: rgba(248,113,113,0.18);
      color: #fff;
    }

    /* ── Alarm banner (global, fixed) ── */
    #alarm-banner {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      color: #000;
      padding: 14px 48px 14px 16px;
      font-weight: 800; font-size: 15px;
      z-index: 999;
      transform: translateY(-100%);
      transition: transform 0.45s cubic-bezier(0.34,1.56,0.64,1);
      border-radius: 0 0 16px 16px;
      box-shadow: 0 8px 30px rgba(251,191,36,0.4);
    }
    #alarm-banner.show { transform: translateY(0); }

    #alarm-banner-close {
      position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.15); border: none;
      width: 28px; height: 28px; border-radius: 50%;
      font-size: 16px; cursor: pointer; color: #000;
      display: flex; align-items: center; justify-content: center;
    }
  </style>
</head>
<body>

  <!-- ── KAT PAGE ── -->
  <div id="kat-page" class="page active">
    <div id="header">Araç Katım</div>

    <div id="card-wrap">
      <div class="hint" id="hint-left">
        <div class="hint-arrow">‹</div>
        <div>−1</div>
      </div>
      <div class="hint" id="hint-right">
        <div class="hint-arrow">›</div>
        <div>+1</div>
      </div>
      <div id="card">
        <div id="drag-glow"></div>
        <div id="car-icon">🚗</div>
        <div id="floor-label">Araç Katım</div>
        <div id="floor-number">0</div>
        <div id="floor-tag">Zemin Kat</div>
      </div>
    </div>

    <button id="save-btn">📍 Bu Katı Kaydet</button>
    <div id="flash">✓ Kaydedildi!</div>

    <div id="bottom">
      <div id="saved-label">Son kaydedilen kat</div>
      <div id="saved-value" style="color:rgba(255,255,255,0.35)">—</div>
    </div>
  </div>

  <!-- ── AVM PAGE ── -->
  <div id="avm-page" class="page">
    <div id="avm-title">AVM Park Yeri</div>

    <div id="avm-saved-card">
      <div id="avm-saved-text">Kayıtlı Park Yeri</div>
      <div id="avm-saved-value" style="color:rgba(255,255,255,0.25)">—</div>
    </div>

    <div id="pickers-wrap">
      <div id="sel-band"></div>
      <div class="picker-col">
        <div class="picker-label">Kat</div>
        <div class="picker" id="picker-kat"></div>
      </div>
      <div class="picker-col">
        <div class="picker-label">Harf</div>
        <div class="picker" id="picker-harf"></div>
      </div>
      <div class="picker-col">
        <div class="picker-label">Numara</div>
        <div class="picker" id="picker-numara"></div>
      </div>
    </div>

    <button id="avm-save-btn">📍 Park Yerini Kaydet</button>
    <div id="avm-flash">✓ Kaydedildi!</div>
  </div>

  <!-- ── SÜRE PAGE ── -->
  <div id="sure-page" class="page">

    <div id="sure-title">Park Bilgisi</div>

    <!-- Timer -->
    <div id="timer-card">
      <div id="timer-icon">🕐</div>
      <div id="timer-display" style="color:rgba(255,255,255,0.2)">—</div>
      <div id="timer-sub">Henüz park kaydedilmedi</div>
    </div>

    <!-- Alarm -->
    <div id="alarm-section">
      <div class="section-label">Hatırlatıcı</div>
      <div id="alarm-buttons"></div>
      <div id="alarm-info"></div>
    </div>

    <!-- Note -->
    <div id="note-section">
      <div class="section-label">Not</div>
      <textarea id="note-input" placeholder="Ör: Kırmızı sütunun yanı, asansörün karşısı..."></textarea>
      <button id="note-save-btn">💾 Notu Kaydet</button>
      <div id="note-flash">✓ Not kaydedildi</div>
    </div>

    <!-- Reset -->
    <button id="reset-btn">🏁 Park Bitti — Sıfırla</button>

  </div>

  <!-- ── ALARM BANNER ── -->
  <div id="alarm-banner">
    🔔 Park alarmı! Arabanıza dönme zamanı.
    <button id="alarm-banner-close">✕</button>
  </div>

  <!-- ── TAB BAR ── -->
  <div id="tab-bar">
    <button class="tab active" data-page="kat-page">
      <span class="tab-icon">🚗</span>
      <span>Katım</span>
    </button>
    <button class="tab" data-page="avm-page">
      <span class="tab-icon">🏬</span>
      <span>AVM</span>
    </button>
    <button class="tab" data-page="sure-page">
      <span class="tab-icon">⏱</span>
      <span>Süre</span>
    </button>
  </div>

<script>
  // ── Tab navigation ─────────────────────────────────────
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      const page = document.getElementById(tab.dataset.page);
      page.classList.add('active');
      if (tab.dataset.page === 'sure-page') updateTimerDisplay();
    });
  });

  // ══════════════════════════════════════════════════════
  //  KAT PAGE
  // ══════════════════════════════════════════════════════
  function theme(floor) {
    if (floor === 0) return { num: '#4ade80', tag: 'Zemin Kat', bg: 'linear-gradient(145deg,#14291e,#1a3528)', glow: 'rgba(74,222,128,0.25)' };
    if (floor < 0)  return { num: '#60a5fa', tag: `B${Math.abs(floor)}`, bg: 'linear-gradient(145deg,#0e1830,#132040)', glow: 'rgba(96,165,250,0.25)' };
    return { num: '#fb923c', tag: `${floor}. Kat`, bg: 'linear-gradient(145deg,#261508,#301c10)', glow: 'rgba(251,146,60,0.25)' };
  }

  const card     = document.getElementById('card');
  const dragGlow = document.getElementById('drag-glow');
  const numEl    = document.getElementById('floor-number');
  const tagEl    = document.getElementById('floor-tag');
  const savedVal = document.getElementById('saved-value');
  const saveBtn  = document.getElementById('save-btn');
  const flashEl  = document.getElementById('flash');

  let current = parseInt(localStorage.getItem('currentFloor') || '0');
  let saved   = localStorage.getItem('savedFloor');

  function render(floor, animate) {
    const t = theme(floor);
    numEl.textContent = floor;
    numEl.style.color = t.num;
    tagEl.textContent = t.tag;
    card.style.transition = animate ? 'background 0.5s ease' : 'none';
    card.style.background = t.bg;
    if (saved !== null) {
      const s = parseInt(saved), st = theme(s);
      savedVal.textContent = `${s}  •  ${st.tag}`;
      savedVal.style.color = st.num;
    } else {
      savedVal.textContent = '—';
      savedVal.style.color = 'rgba(255,255,255,0.35)';
    }
  }

  function springSnap() {
    card.style.transition = 'transform 0.55s cubic-bezier(0.34,1.56,0.64,1)';
    card.style.transform  = 'translateX(0) rotate(0deg)';
    dragGlow.style.opacity = '0';
    setTimeout(() => { card.style.transition = ''; }, 550);
  }
  function bounceBack() {
    card.style.transition = 'transform 0.45s cubic-bezier(0.34,1.56,0.64,1)';
    card.style.transform  = 'translateX(0) rotate(0deg)';
    dragGlow.style.opacity = '0';
    setTimeout(() => { card.style.transition = ''; }, 450);
  }
  function changeFloor(delta) {
    current += delta;
    localStorage.setItem('currentFloor', current);
    springSnap();
    setTimeout(() => render(current, true), 80);
  }
  function showFlash(color) {
    flashEl.style.color   = color;
    flashEl.style.opacity = '1';
    saveBtn.style.opacity = '0';
    setTimeout(() => { flashEl.style.opacity = '0'; saveBtn.style.opacity = '1'; }, 1200);
  }

  saveBtn.addEventListener('click', () => {
    saved = current;
    localStorage.setItem('savedFloor', saved);
    localStorage.setItem('parkStartTime', Date.now().toString());
    render(current, false);
    showFlash(theme(current).num);
    updateTimerDisplay();
  });

  let startX = 0, dx = 0, vx = 0, prevX = 0, prevT = 0, dragging = false;
  const THRESHOLD = 55, VEL_THRESH = 0.35, DAMPING = 0.42;

  function onStart(clientX) {
    startX = clientX; dx = 0; vx = 0;
    prevX = clientX; prevT = Date.now();
    dragging = true; card.style.transition = '';
  }
  function onMove(clientX) {
    if (!dragging) return;
    const now = Date.now();
    dx = clientX - startX;
    vx = (clientX - prevX) / Math.max(now - prevT, 1);
    prevX = clientX; prevT = now;
    const translated = dx * DAMPING;
    const rot = (dx / window.innerWidth) * 10;
    card.style.transform = `translateX(${translated}px) rotate(${rot}deg)`;
    const t = theme(current);
    if (Math.abs(dx) > 15) {
      dragGlow.style.background = dx > 0
        ? `linear-gradient(to right, transparent, ${t.glow})`
        : `linear-gradient(to left, transparent, ${t.glow})`;
      dragGlow.style.opacity = String(Math.min(Math.abs(dx) / 120, 1));
    } else {
      dragGlow.style.opacity = '0';
    }
  }
  function onEnd() {
    if (!dragging) return;
    dragging = false;
    if      (dx >  THRESHOLD || vx >  VEL_THRESH) changeFloor(+1);
    else if (dx < -THRESHOLD || vx < -VEL_THRESH) changeFloor(-1);
    else bounceBack();
    dx = 0;
  }

  card.addEventListener('touchstart', e => { if (e.touches.length === 1) onStart(e.touches[0].clientX); }, { passive: true });
  card.addEventListener('touchmove',  e => onMove(e.touches[0].clientX), { passive: true });
  card.addEventListener('touchend',   onEnd);
  card.addEventListener('touchcancel',onEnd);
  card.addEventListener('mousedown', e => { onStart(e.clientX); e.preventDefault(); });
  document.addEventListener('mousemove', e => { if (dragging) onMove(e.clientX); });
  document.addEventListener('mouseup', onEnd);

  render(current, false);

  // ══════════════════════════════════════════════════════
  //  AVM PAGE
  // ══════════════════════════════════════════════════════
  const ITEM_H   = 52;
  const FLOORS   = ['B5','B4','B3','B2','B1','Z','1','2','3','4','5'];
  const HARFLER  = ['A','B','C','D','E','F','G','H','I','J','K','L','M','N','O','P','R','S','T','U','V','Y','Z'];
  const NUMARALAR = Array.from({ length: 99 }, (_, i) => String(i + 1));

  function buildPicker(id, items) {
    const el = document.getElementById(id);
    const spacer = () => { const d = document.createElement('div'); d.style.height = ITEM_H + 'px'; return d; };
    el.appendChild(spacer());
    items.forEach(val => {
      const d = document.createElement('div');
      d.className = 'picker-item';
      d.textContent = val;
      el.appendChild(d);
    });
    el.appendChild(spacer());
  }

  buildPicker('picker-kat',    FLOORS);
  buildPicker('picker-harf',   HARFLER);
  buildPicker('picker-numara', NUMARALAR);

  const pKat    = document.getElementById('picker-kat');
  const pHarf   = document.getElementById('picker-harf');
  const pNumara = document.getElementById('picker-numara');

  function getIdx(picker) { return Math.round(picker.scrollTop / ITEM_H); }

  function highlight(picker) {
    const items = picker.querySelectorAll('.picker-item');
    const sel   = getIdx(picker);
    items.forEach((item, i) => {
      const d = Math.abs(i - sel);
      if (d === 0)      { item.style.color = '#fff';                   item.style.fontSize = '22px'; }
      else if (d === 1) { item.style.color = 'rgba(255,255,255,0.35)'; item.style.fontSize = '17px'; }
      else              { item.style.color = 'rgba(255,255,255,0.1)';  item.style.fontSize = '13px'; }
    });
  }

  [pKat, pHarf, pNumara].forEach(p => {
    p.addEventListener('scroll', () => highlight(p), { passive: true });
  });

  function setPickerTo(picker, items, value) {
    const idx = items.indexOf(value);
    picker.scrollTop = (idx >= 0 ? idx : 0) * ITEM_H;
    highlight(picker);
  }

  const avmSpot = JSON.parse(localStorage.getItem('avmSpot') || 'null');
  setTimeout(() => {
    setPickerTo(pKat,    FLOORS,    avmSpot ? avmSpot.kat    : 'Z');
    setPickerTo(pHarf,   HARFLER,   avmSpot ? avmSpot.harf   : 'A');
    setPickerTo(pNumara, NUMARALAR, avmSpot ? avmSpot.numara : '1');
  }, 60);

  function updateAvmDisplay() {
    const spot = JSON.parse(localStorage.getItem('avmSpot') || 'null');
    const el   = document.getElementById('avm-saved-value');
    if (spot) {
      el.textContent  = `${spot.kat} · ${spot.harf} · ${spot.numara}`;
      el.style.color  = '#a78bfa';
    } else {
      el.textContent  = '—';
      el.style.color  = 'rgba(255,255,255,0.25)';
    }
  }

  document.getElementById('avm-save-btn').addEventListener('click', () => {
    const spot = {
      kat:    FLOORS[getIdx(pKat)]       || 'Z',
      harf:   HARFLER[getIdx(pHarf)]     || 'A',
      numara: NUMARALAR[getIdx(pNumara)] || '1',
    };
    localStorage.setItem('avmSpot', JSON.stringify(spot));
    localStorage.setItem('parkStartTime', Date.now().toString());
    updateAvmDisplay();
    updateTimerDisplay();

    const btn   = document.getElementById('avm-save-btn');
    const flash = document.getElementById('avm-flash');
    flash.style.opacity = '1';
    btn.style.opacity   = '0';
    setTimeout(() => { flash.style.opacity = '0'; btn.style.opacity = '1'; }, 1200);
  });

  updateAvmDisplay();

  // ══════════════════════════════════════════════════════
  //  SÜRE PAGE — Timer
  // ══════════════════════════════════════════════════════
  const timerDisplay = document.getElementById('timer-display');
  const timerSub     = document.getElementById('timer-sub');

  function getTimerColor(totalMin) {
    if (totalMin < 60)  return '#4ade80';
    if (totalMin < 120) return '#fbbf24';
    return '#f87171';
  }

  function updateTimerDisplay() {
    const start = parseInt(localStorage.getItem('parkStartTime') || '0');
    if (!start) {
      timerDisplay.textContent = '—';
      timerDisplay.style.color = 'rgba(255,255,255,0.2)';
      timerSub.textContent = 'Henüz park kaydedilmedi';
      return;
    }
    const elapsed   = Date.now() - start;
    const totalSec  = Math.floor(elapsed / 1000);
    const totalMin  = Math.floor(totalSec / 60);
    const hours     = Math.floor(totalMin / 60);
    const mins      = totalMin % 60;

    timerDisplay.style.color = getTimerColor(totalMin);
    timerDisplay.textContent = hours > 0
      ? `${hours} sa ${String(mins).padStart(2,'0')} dk`
      : `${mins} dk`;

    const startDate = new Date(start);
    const timeStr   = startDate.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
    timerSub.textContent = `${timeStr}'de park ettiniz`;
  }

  setInterval(() => {
    updateTimerDisplay();
    checkAlarm();
  }, 30000);

  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) { updateTimerDisplay(); checkAlarm(); }
  });

  // ══════════════════════════════════════════════════════
  //  SÜRE PAGE — Alarm
  // ══════════════════════════════════════════════════════
  const ALARM_OPTIONS = [
    { label: '30 dk', minutes: 30 },
    { label: '1 sa',  minutes: 60 },
    { label: '1.5 sa', minutes: 90 },
    { label: '2 sa',  minutes: 120 },
    { label: '3 sa',  minutes: 180 },
  ];

  let alarmTimeout = null;
  let alarmFired   = localStorage.getItem('alarmFired') === 'true';

  function buildAlarmButtons() {
    const container = document.getElementById('alarm-buttons');
    ALARM_OPTIONS.forEach(opt => {
      const btn = document.createElement('button');
      btn.className     = 'alarm-btn';
      btn.textContent   = opt.label;
      btn.dataset.minutes = opt.minutes;
      btn.addEventListener('click', () => handleAlarmClick(opt.minutes));
      container.appendChild(btn);
    });
  }

  async function handleAlarmClick(minutes) {
    const currentMins = parseInt(localStorage.getItem('alarmMinutes') || '0');
    const hasAlarm    = !!localStorage.getItem('alarmTime') && !alarmFired;

    if (hasAlarm && currentMins === minutes) {
      cancelAlarm(); return;
    }

    if ('Notification' in window && Notification.permission === 'default') {
      await Notification.requestPermission();
    }
    setAlarm(minutes);
  }

  function setAlarm(minutes) {
    const alarmTime = Date.now() + minutes * 60 * 1000;
    localStorage.setItem('alarmTime', alarmTime.toString());
    localStorage.setItem('alarmMinutes', minutes.toString());
    localStorage.setItem('alarmFired', 'false');
    alarmFired = false;

    if (alarmTimeout) clearTimeout(alarmTimeout);
    alarmTimeout = setTimeout(fireAlarm, alarmTime - Date.now());

    updateAlarmDisplay();
    syncAlarmButtons();
  }

  function cancelAlarm() {
    localStorage.removeItem('alarmTime');
    localStorage.removeItem('alarmMinutes');
    if (alarmTimeout) clearTimeout(alarmTimeout);
    alarmTimeout = null;
    updateAlarmDisplay();
    syncAlarmButtons();
  }

  function fireAlarm() {
    if (alarmFired) return;
    alarmFired = true;
    localStorage.setItem('alarmFired', 'true');

    if (Notification.permission === 'granted') {
      try {
        new Notification('🚗 Park Alarmı!', {
          body: 'Park süreniz doldu! Arabanıza dönme zamanı.',
          requireInteraction: true, tag: 'park-alarm'
        });
      } catch(e) {}
    }

    document.getElementById('alarm-banner').classList.add('show');
    syncAlarmButtons();
    updateAlarmDisplay();
  }

  function checkAlarm() {
    const alarmTime = parseInt(localStorage.getItem('alarmTime') || '0');
    const fired     = localStorage.getItem('alarmFired') === 'true';
    if (!alarmTime) return;
    if (!fired && Date.now() >= alarmTime) {
      fireAlarm();
    } else if (!fired && !alarmTimeout) {
      const delay = alarmTime - Date.now();
      if (delay > 0) alarmTimeout = setTimeout(fireAlarm, delay);
    }
  }

  function updateAlarmDisplay() {
    const alarmTime = parseInt(localStorage.getItem('alarmTime') || '0');
    const fired     = localStorage.getItem('alarmFired') === 'true';
    const info      = document.getElementById('alarm-info');

    if (!alarmTime || fired) { info.textContent = ''; return; }

    const alarmDate = new Date(alarmTime);
    const timeStr   = alarmDate.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
    const mins      = parseInt(localStorage.getItem('alarmMinutes') || '0');
    info.textContent = `⏰ ${timeStr}'de alarm kurulu · iptal için tekrar bas`;
  }

  function syncAlarmButtons() {
    const activeMins = alarmFired ? null : parseInt(localStorage.getItem('alarmMinutes') || '0') || null;
    document.querySelectorAll('.alarm-btn').forEach(btn => {
      btn.classList.toggle('active', parseInt(btn.dataset.minutes) === activeMins);
    });
  }

  document.getElementById('alarm-banner-close').addEventListener('click', () => {
    document.getElementById('alarm-banner').classList.remove('show');
    cancelAlarm();
  });

  // ══════════════════════════════════════════════════════
  //  SÜRE PAGE — Note
  // ══════════════════════════════════════════════════════
  const noteInput   = document.getElementById('note-input');
  const noteFlash   = document.getElementById('note-flash');

  noteInput.value = localStorage.getItem('parkNote') || '';

  document.getElementById('note-save-btn').addEventListener('click', () => {
    localStorage.setItem('parkNote', noteInput.value);
    noteFlash.style.opacity = '1';
    setTimeout(() => { noteFlash.style.opacity = '0'; }, 1500);
  });

  // ══════════════════════════════════════════════════════
  //  SÜRE PAGE — Reset (2-tap confirmation)
  // ══════════════════════════════════════════════════════
  const resetBtn = document.getElementById('reset-btn');
  let resetPending = false, resetTimer = null;

  resetBtn.addEventListener('click', () => {
    if (!resetPending) {
      resetPending = true;
      resetBtn.textContent = '⚠️ Emin misin? Tekrar bas';
      resetBtn.classList.add('confirm');
      resetTimer = setTimeout(() => {
        resetPending = false;
        resetBtn.textContent = '🏁 Park Bitti — Sıfırla';
        resetBtn.classList.remove('confirm');
      }, 3000);
    } else {
      clearTimeout(resetTimer);
      resetPending = false;
      resetBtn.textContent = '🏁 Park Bitti — Sıfırla';
      resetBtn.classList.remove('confirm');
      doReset();
    }
  });

  function doReset() {
    ['parkStartTime','alarmTime','alarmMinutes','alarmFired','parkNote'].forEach(k => localStorage.removeItem(k));
    alarmFired = false;
    if (alarmTimeout) clearTimeout(alarmTimeout);
    alarmTimeout = null;
    noteInput.value = '';
    document.getElementById('alarm-banner').classList.remove('show');
    updateTimerDisplay();
    updateAlarmDisplay();
    syncAlarmButtons();
  }

  // ── Init ─────────────────────────────────────────────
  buildAlarmButtons();
  checkAlarm();
  updateAlarmDisplay();
  syncAlarmButtons();
  updateTimerDisplay();
</script>
</body>
</html>
